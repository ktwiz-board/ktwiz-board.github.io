name: live-data

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 짧게 1회 실행 (스크립트가 모드별로 수집 범위를 스스로 결정)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: "Fetch once (짧은 실행 — 러너 점유 최소화)"
        run: |
          git config user.name "live-bot"
          git config user.email "actions@github.com"
          # 직전 수집본을 data 브랜치에서 복원 (일일 캐시·모드 판단용)
          git fetch -q origin data || true
          mkdir -p data
          git show origin/data:data/live.json > data/live.json 2>/dev/null || true
          git show origin/data:data/standings-history.json > data/standings-history.json 2>/dev/null || true
          node scripts/fetch-live.js || true
          if [ -f data/live.json ]; then
            git add data/live.json data/standings-history.json 2>/dev/null || git add data/live.json
            if ! git diff --cached --quiet; then
              git commit -q -m "live data"
              # main 히스토리를 더럽히지 않도록 data 브랜치에만 강제 푸시
              git push -f -q origin HEAD:data
            fi
          fi
