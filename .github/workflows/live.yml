name: live-data

on:
  schedule:
    - cron: "17 * * * *"   # 시간당 워치독 (루프가 죽었을 때 재기동)
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: live-data
  cancel-in-progress: false

jobs:
  fetch-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - name: "Fetch loop (경기중 5분 / 경기전 10분 / 종료후 30분·영상만, 약 5.5시간)"
        run: |
          git config user.name "live-bot"
          git config user.email "actions@github.com"
          END=$((SECONDS + 19500))
          while [ $SECONDS -lt $END ]; do
            OUT=$(node scripts/fetch-live.js 2>&1) || true
            echo "$OUT" | tail -3
            if ! cmp -s data/live.json /tmp/last.json 2>/dev/null; then
              cp data/live.json /tmp/last.json
              git add data/live.json
              git commit -q -m "live data" || true
              # main 히스토리를 더럽히지 않도록 data 브랜치에만 강제 푸시
              git push -f -q origin HEAD:data || true
              git reset -q --soft HEAD~1
            fi
            NAP=$(echo "$OUT" | grep -o 'SLEEP=[0-9]*' | tail -1 | cut -d= -f2)
            sleep "${NAP:-300}"
          done
      - name: Self re-dispatch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run live-data --repo ${{ github.repository }} || true
